<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f6ef7"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="900" height="3" fill="url(#accent)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="160" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="160" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="700" y1="0" x2="700" y2="160" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>

  <!-- Accent dot cluster top right -->
  <circle cx="840" cy="30" r="1.5" fill="#4f6ef7" opacity="0.6"/>
  <circle cx="855" cy="22" r="1" fill="#818cf8" opacity="0.4"/>
  <circle cx="868" cy="35" r="2" fill="#4f6ef7" opacity="0.3"/>
  <circle cx="878" cy="18" r="1" fill="#818cf8" opacity="0.5"/>
  <circle cx="890" cy="28" r="1.5" fill="#4f6ef7" opacity="0.4"/>

  <!-- Left bracket -->
  <text x="32" y="98" font-family="'Courier New', monospace" font-size="48" fill="#4f6ef7" opacity="0.15" font-weight="700">{</text>

  <!-- Name -->
  <text x="72" y="80" font-family="'Georgia', serif" font-size="38" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">SHRAVYA S SHETTY</text>

  <!-- Underline accent -->
  <rect x="72" y="86" width="320" height="2" fill="url(#accent)" opacity="0.4" rx="1"/>

  <!-- Subtitle row 1 -->
  <text x="74" y="108" font-family="'Courier New', monospace" font-size="12" fill="#8b949e" letter-spacing="0.3">
    ML Engineer · Computer Vision · IEEE Published
  </text>

  <!-- Subtitle row 2 -->
  <text x="74" y="126" font-family="'Courier New', monospace" font-size="11" fill="#4f6ef7" letter-spacing="0.3" opacity="0.85">
    Ex-Research Intern @ IISc Bengaluru · NMAMIT · CGPA 9.18
  </text>

  <!-- Comment line -->
  <text x="74" y="148" font-family="'Courier New', monospace" font-size="10.5" fill="#4f6ef7" opacity="0.45">
    // building AI for healthcare &amp; diagnostics — open to SDE / ML roles mid-2026
  </text>

  <!-- Right side decoration — vertical text -->
  <text x="880" y="50" font-family="'Courier New', monospace" font-size="9" fill="#4f6ef7" opacity="0.2" transform="rotate(90, 880, 50)" letter-spacing="2">ML · CV · IEEE</text>
</svg>
