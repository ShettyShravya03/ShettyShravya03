<svg width="100%" viewBox="0 0 680 108" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Shravya S Shetty — Key Metrics</title>
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.6" fill="#00FFB4" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="680" height="108" fill="#0d1117"/>
  <rect width="680" height="108" fill="url(#dots)"/>

  <!-- Card 1: CGPA -->
  <rect x="8" y="10" width="157" height="88" rx="6" fill="#0a1628" stroke="#152a42" stroke-width="0.5"/>
  <rect x="8" y="10" width="157" height="2.5" rx="1.5" fill="#00FFB4"/>
  <text x="86" y="28" font-family="monospace" font-size="8" fill="#00FFB4" opacity="0.5" text-anchor="middle" letter-spacing="2">ACADEMIC</text>
  <text x="86" y="57" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="700" fill="#00FFB4" text-anchor="middle">9.18</text>
  <line x1="46" y1="65" x2="126" y2="65" stroke="#00FFB4" stroke-width="0.4" opacity="0.2"/>
  <text x="86" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c9d1d9" text-anchor="middle">CGPA</text>
  <text x="86" y="91" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#4a7f9a" text-anchor="middle">NMAMIT</text>

  <!-- Card 2: ROC-AUC -->
  <rect x="177" y="10" width="157" height="88" rx="6" fill="#0a1628" stroke="#152a42" stroke-width="0.5"/>
  <rect x="177" y="10" width="157" height="2.5" rx="1.5" fill="#00FFB4"/>
  <text x="255" y="28" font-family="monospace" font-size="8" fill="#00FFB4" opacity="0.5" text-anchor="middle" letter-spacing="2">ML MODEL</text>
  <text x="255" y="57" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="700" fill="#00FFB4" text-anchor="middle">0.90</text>
  <line x1="215" y1="65" x2="295" y2="65" stroke="#00FFB4" stroke-width="0.4" opacity="0.2"/>
  <text x="255" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c9d1d9" text-anchor="middle">ROC-AUC</text>
  <text x="255" y="91" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#4a7f9a" text-anchor="middle">EEG · IEEE 2025</text>

  <!-- Card 3: X-rays -->
  <rect x="346" y="10" width="157" height="88" rx="6" fill="#0a1628" stroke="#152a42" stroke-width="0.5"/>
  <rect x="346" y="10" width="157" height="2.5" rx="1.5" fill="#00FFB4"/>
  <text x="424" y="28" font-family="monospace" font-size="8" fill="#00FFB4" opacity="0.5" text-anchor="middle" letter-spacing="2">CV PIPELINE</text>
  <text x="424" y="57" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="700" fill="#00FFB4" text-anchor="middle">1,294</text>
  <line x1="384" y1="65" x2="464" y2="65" stroke="#00FFB4" stroke-width="0.4" opacity="0.2"/>
  <text x="424" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c9d1d9" text-anchor="middle">X-rays</text>
  <text x="424" y="91" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#4a7f9a" text-anchor="middle">Best Project · EXPRO</text>

  <!-- Card 4: Accuracy -->
  <rect x="515" y="10" width="157" height="88" rx="6" fill="#0a1628" stroke="#152a42" stroke-width="0.5"/>
  <rect x="515" y="10" width="157" height="2.5" rx="1.5" fill="#00FFB4"/>
  <text x="593" y="28" font-family="monospace" font-size="8" fill="#00FFB4" opacity="0.5" text-anchor="middle" letter-spacing="2">INTERNSHIP</text>
  <text x="593" y="57" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="700" fill="#00FFB4" text-anchor="middle">85%</text>
  <line x1="553" y1="65" x2="633" y2="65" stroke="#00FFB4" stroke-width="0.4" opacity="0.2"/>
  <text x="593" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c9d1d9" text-anchor="middle">Extraction Acc.</text>
  <text x="593" y="91" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#4a7f9a" text-anchor="middle">OCR · IISc</text>
