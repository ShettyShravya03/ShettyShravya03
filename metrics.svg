<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 90" width="900" height="90">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="90" fill="#0d1117"/>

  <!-- Card 1: CGPA -->
  <rect x="0" y="0" width="224" height="90" fill="url(#cardBg)"/>
  <rect x="0" y="0" width="224" height="2" fill="#4f6ef7"/>
  <text x="112" y="44" font-family="'Georgia', serif" font-size="28" font-weight="700" fill="#4f6ef7" text-anchor="middle" letter-spacing="-0.5">9.18</text>
  <text x="112" y="61" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1.5">CGPA</text>
  <text x="112" y="76" font-family="'Courier New', monospace" font-size="9" fill="#4f6ef7" text-anchor="middle" opacity="0.6">NMAMIT</text>

  <!-- Divider -->
  <rect x="224" y="0" width="1" height="90" fill="#21262d"/>

  <!-- Card 2: ROC-AUC -->
  <rect x="225" y="0" width="224" height="90" fill="url(#cardBg)"/>
  <rect x="225" y="0" width="224" height="2" fill="#818cf8"/>
  <text x="337" y="44" font-family="'Georgia', serif" font-size="28" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="-0.5">0.90</text>
  <text x="337" y="61" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1.5">ROC-AUC</text>
  <text x="337" y="76" font-family="'Courier New', monospace" font-size="9" fill="#818cf8" text-anchor="middle" opacity="0.6">EEG · IEEE 2025</text>

  <!-- Divider -->
  <rect x="449" y="0" width="1" height="90" fill="#21262d"/>

  <!-- Card 3: X-rays -->
  <rect x="450" y="0" width="224" height="90" fill="url(#cardBg)"/>
  <rect x="450" y="0" width="224" height="2" fill="#4f6ef7"/>
  <text x="562" y="44" font-family="'Georgia', serif" font-size="28" font-weight="700" fill="#4f6ef7" text-anchor="middle" letter-spacing="-0.5">1,294</text>
  <text x="562" y="61" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1.5">X-RAYS</text>
  <text x="562" y="76" font-family="'Courier New', monospace" font-size="9" fill="#4f6ef7" text-anchor="middle" opacity="0.6">Best Project · EXPRO</text>

  <!-- Divider -->
  <rect x="674" y="0" width="1" height="90" fill="#21262d"/>

  <!-- Card 4: Extraction Acc -->
  <rect x="675" y="0" width="225" height="90" fill="url(#cardBg)"/>
  <rect x="675" y="0" width="225" height="2" fill="#818cf8"/>
  <text x="787" y="44" font-family="'Georgia', serif" font-size="28" font-weight="700" fill="#818cf8" text-anchor="middle" letter-spacing="-0.5">85%</text>
  <text x="787" y="61" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1.5">EXTRACTION ACC.</text>
  <text x="787" y="76" font-family="'Courier New', monospace" font-size="9" fill="#818cf8" text-anchor="middle" opacity="0.6">OCR · IISc</text>

  <!-- Bottom border -->
  <rect x="0" y="89" width="900" height="1" fill="#21262d"/>
</svg>
